<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <nav class="navbar navbar-dark bg-primary sticky-top">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <span class="navbar-brand mb-0 h5">Attendance Management System</span>
            <div class="d-flex align-items-center">
                <span class="text-white me-3">Welcome, User</span>
                <a href="login.html" class="btn btn-outline-light btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4">
        <div class="row gx-4">
            <div class="col-lg-3 mb-4">
                <div class="card shadow-sm sidebar h-100">
                    <div class="card-body">
                        <h5 class="card-title">Navigation</h5>
                        <div class="list-group mt-3">
                            <a href="Dashboard.html" class="list-group-item list-group-item-action">Dashboard</a>
                            <a href="Students.html" class="list-group-item list-group-item-action">Students</a>
                            <a href="#" class="list-group-item list-group-item-action active">Attendance</a>
                            <a href="Report.html" class="list-group-item list-group-item-action">Report</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-9">
                <div class="card shadow-sm attendance-card mx-auto">
                    <div class="card-body">
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-start mb-4">
                            <div>
                                <h2 class="mb-1">Attendance</h2>
                                <p class="text-muted mb-0">Mark student attendance and track session topics in one form.</p>
                            </div>
                        </div>
                        <div class="row justify-content-center">
                            <div class="col-md-10">
                                <div class="card border-0 shadow-sm">
                                    <div class="card-body">
                                        <h3 class="card-title text-center mb-4">Mark Your Attendance</h3>
                                        <form>
                                            <div class="mb-3">
                                                <label for="name" class="form-label">Subject Name</label>
                                                <input type="text" class="form-control" id="name" required
                                                    placeholder="Enter subject name">
                                            </div>
                                            <div class="mb-3">
                                                <label for="topics" class="form-label">Topics Covered</label>
                                                <input type="text" class="form-control" id="topics" required
                                                    placeholder="Enter topics covered">
                                            </div>
                                            <div class="mb-3">
                                                <label for="date" class="form-label">Date</label>
                                                <input type="date" class="form-control" id="date" required>
                                            </div>
                                            <button id="log-button" type="submit" class="btn btn-primary w-100">Submit</button>
                                        </form>
                                    </div>
                                </div>
                                <div class="card border-0 shadow-sm mt-4">
                                    <div class="card-body">
                                        <h3 class="card-title text-center mb-4">Attendance Log</h3>
                                        <table class="table table-striped table-bordered table-hover mt-2 text-center">
                                            <thead>
                                                <tr>
                                                    <th>Roll No</th>
                                                    <th>Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr>
                                                    <td>1</td>
                                                    <td>
                                                        <select>
                                                            <option value="present">Present</option>
                                                            <option value="absent">Absent</option>
                                                        </select>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td>2</td>
                                                    <td>
                                                        <select>
                                                            <option value="present">Present</option>
                                                            <option value="absent">Absent</option>
                                                        </select>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td>3</td>
                                                    <td>
                                                        <select>
                                                            <option value="present">Present</option>
                                                            <option value="absent">Absent</option>
                                                        </select>
                                                    </td>
                                                </tr>
                                                <tr>
                                                    <td>4</td>
                                                    <td>
                                                        <select>
                                                            <option value="present">Present</option>
                                                            <option value="absent">Absent</option>
                                                        </select>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
