<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

       <link rel="stylesheet" href="style.css">
        <style>
            body {
                min-height: 100vh;
                background: linear-gradient(135deg, #eef5ff 0%, #d6e8ff 45%, #ffffff 100%);
            }
            .navbar {
                padding: 1rem 1.5rem;
                box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.1);
            }
            .navbar-brand {
                font-weight: 700;
                letter-spacing: 0.04em;
            }
            .navbar-nav .nav-link {
                color: rgba(255, 255, 255, 0.9);
            }
            .navbar-nav .nav-link:hover {
                color: #ffffff;
            }
            .login-wrapper {
                min-height: 100vh;
                padding: 3rem 1rem;
            }
            .login-card {
                width: 720px;
                max-width: 100%;
                border-radius: 1.1rem;
            }
            .login-card .card-body {
                padding: 2.5rem;
            }
        </style>

</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Attendance Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Register</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="login-wrapper d-flex justify-content-center align-items-center">
        <div class="card shadow-sm login-card">
            <div class="card-body">
                <h3 class="card-title text-center mb-4">Sign in to your account</h3>
                <form>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="remember">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="small">Forgot password?</a>
                    </div>
                    <button id="log-button" type="submit" class="btn btn-primary w-100">Login</button>
                    <p class="text-center mt-3 mb-0">New user? <a href="register.html">Register here</a></p>
                </form>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.querySelector('form');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');

            form.addEventListener('submit', function (event) {
                event.preventDefault();
                const email = emailInput.value.trim();
                const password = passwordInput.value.trim();

                if (!email || !password) {
                    alert('Fill this field');
                    if (!email) {
                        emailInput.focus();
                    } else {
                        passwordInput.focus();
                    }
                    return;
                }

                const directPassword = localStorage.getItem(email);
                if (directPassword !== null) {
                    if (directPassword === password) {
                        alert('Login successful');
                        window.location.href = 'dashboard.html';
                    } else {
                        alert('Wrong email or password');
                    }
                    return;
                }

                const users = getRegisteredUsers();
                const userMatch = users.find(user => user.email === email && user.password === password);
                if (userMatch) {
                    alert('Login successful');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Wrong email or password');
                }
            });

            function getRegisteredUsers() {
                const users = [];
                const possibleKeys = ['users', 'registeredUsers', 'user'];

                for (const key of possibleKeys) {
                    const raw = localStorage.getItem(key);
                    if (!raw) {
                        continue;
                    }

                    try {
                        const parsed = JSON.parse(raw);
                        if (Array.isArray(parsed)) {
                            parsed.forEach(item => {
                                if (item && typeof item === 'object' && 'email' in item && 'password' in item) {
                                    users.push({ email: item.email, password: item.password });
                                }
                            });
                        } else if (parsed && typeof parsed === 'object' && 'email' in parsed && 'password' in parsed) {
                            users.push({ email: parsed.email, password: parsed.password });
                        }
                    } catch (error) {
                        // ignore invalid JSON
                    }
                }

                const storedEmail = localStorage.getItem('email');
                const storedPassword = localStorage.getItem('password');
                if (storedEmail && storedPassword) {
                    users.push({ email: storedEmail, password: storedPassword });
                }

                return users;
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>

</html>
